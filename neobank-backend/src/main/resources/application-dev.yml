# ==============================================================================
# PROFILE: dev
# Use this for LOCAL development on your machine.
# Run with: mvn spring-boot:run
# Or set env var: SPRING_PROFILES_ACTIVE=dev
# ==============================================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/neobank_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate   # Change to "update" temporarily if tables don't exist yet
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.neobank: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/neobank-dev.log

server:
  port: 8080

# -------------------------------------------------------
# AWS: uses your REAL Cognito, S3, SES (cloud services)
# but database is LOCAL postgres
# -------------------------------------------------------
aws:
  region: us-east-1
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY:}

  cognito:
    userPoolId: ${AWS_COGNITO_USER_POOL_ID:}
    clientId: ${AWS_COGNITO_CLIENT_ID:}

  s3:
    bucketName: ${AWS_S3_BUCKET_NAME:neobank-kyc-dev-carlos}

  ses:
    fromEmail: ${AWS_SES_FROM_EMAIL:felixlopez2292@gmail.com}

  sqs:
    queueUrl: ${AWS_SQS_QUEUE_URL:}

app:
  jwt:
    secret: ${JWT_SECRET:DevSecretKeyForLocalDevelopmentOnlyMinimum256BitsLong!!}
    expiration: 86400000   # 24 hours — longer expiry so token doesn't expire while testing

  cors:
    allowed-origins: http://localhost:3000,http://localhost:19006,http://localhost:8081