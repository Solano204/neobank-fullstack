# ==============================================================================
# PROFILE: staging
# Use this when testing against REAL RDS but NOT yet in production.
# This is the "pre-production" environment — everything real except traffic is low.
# Run with: SPRING_PROFILES_ACTIVE=staging
# Requires ALL env vars to be set (no localhost fallbacks)
# ==============================================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true          # still show SQL for debugging
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.neobank: DEBUG      # still verbose for catching bugs
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/neobank-staging.log
    max-size: 10MB
    max-history: 7

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

aws:
  region: ${AWS_REGION}
  accessKeyId: ${AWS_ACCESS_KEY_ID}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY}

  cognito:
    userPoolId: ${AWS_COGNITO_USER_POOL_ID}
    clientId: ${AWS_COGNITO_CLIENT_ID}

  s3:
    bucketName: ${AWS_S3_BUCKET_NAME}

  ses:
    fromEmail: ${AWS_SES_FROM_EMAIL}

  sqs:
    queueUrl: ${AWS_SQS_QUEUE_URL}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000     # 1 hour

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}