# ==============================================================================
# PROFILE: prod
# Use this on EC2 for real users.
# NEVER run this locally. NEVER hardcode values here.
# All values come from environment variables set on the EC2 instance.
# Run with: SPRING_PROFILES_ACTIVE=prod
# ==============================================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate    # NEVER use "update" or "create" in prod — run migrations manually
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.neobank: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/neobank/neobank-backend.log
    max-size: 50MB
    max-history: 30

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized   # Don't expose details publicly in prod

aws:
  region: ${AWS_REGION}
  accessKeyId: ${AWS_ACCESS_KEY_ID}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY}

  cognito:
    userPoolId: ${AWS_COGNITO_USER_POOL_ID}
    clientId: ${AWS_COGNITO_CLIENT_ID}

  s3:
    bucketName: ${AWS_S3_BUCKET_NAME}

  ses:
    fromEmail: ${AWS_SES_FROM_EMAIL}

  sqs:
    queueUrl: ${AWS_SQS_QUEUE_URL}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}   # 1 hour in prod

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}