spring:
  application:
    name: neobank-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:neobank_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

aws:
  region: ${AWS_REGION:us-east-1}
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY:}

  cognito:
    userPoolId: ${AWS_COGNITO_USER_POOL_ID:}
    clientId: ${AWS_COGNITO_CLIENT_ID:}
    region: ${AWS_REGION:us-east-1}

  s3:
    bucketName: ${AWS_S3_BUCKET_NAME:neobank-kyc}

  ses:
    fromEmail: ${AWS_SES_FROM_EMAIL:noreply@neobank.com}

  sqs:
    queueUrl: ${AWS_SQS_QUEUE_URL:}
    queueArn: ${AWS_SQS_QUEUE_ARN:}

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast256BitsLongForHS512Algorithm}
    expiration: ${JWT_EXPIRATION:3600000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}