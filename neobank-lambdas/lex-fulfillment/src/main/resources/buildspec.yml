version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - echo Building lex-fulfillment...
      - mvn clean package

artifacts:
  files:
    - target/lex-fulfillment-1.0.0.jar
    - template.yaml
  name: lex-fulfillment-$(date +%Y%m%d-%H%M%S)

cache:
  paths:
    - '/root/.m2/**/*'