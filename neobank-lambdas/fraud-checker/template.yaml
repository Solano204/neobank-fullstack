AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fraud Checker Lambda

Resources:
  FraudCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fraud-checker
      Handler: lambda_function.lambda_handler
      Runtime: python3.11
      CodeUri: .
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTableName
          SNS_FRAUD_TOPIC: !Ref SnsFraudTopicArn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}'
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SnsFraudTopicArn
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !Ref SQSQueueArn
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !Ref SQSQueueArn
            BatchSize: 10

Parameters:
  DynamoDBTableName:
    Type: String
    Default: transactions
  SnsFraudTopicArn:
    Type: String
  SQSQueueArn:
    Type: String

Outputs:
  FraudCheckerFunctionArn:
    Value: !GetAtt FraudCheckerFunction.Arn