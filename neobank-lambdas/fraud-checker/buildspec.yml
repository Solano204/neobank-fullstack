version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

  build:
    commands:
      - echo Building fraud-checker...
      - pip install -r requirements.txt -t .
      - zip -r fraud-checker.zip .

artifacts:
  files:
    - fraud-checker.zip
    - template.yaml
  name: fraud-checker-$(date +%Y%m%d-%H%M%S)